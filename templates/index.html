<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사주×MBTI 인생소설 | 우리가 만났다면</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <canvas id="stars"></canvas>

  <div class="container">
    <!-- 헤더 -->
    <header class="hero">
      <div class="hero-symbol">☯</div>
      <h1 class="hero-title">우리가 만났다면</h1>
      <p class="hero-subtitle">사주 × MBTI로 쓰여지는 두 사람의 가상 인생 소설</p>
      <p class="hero-desc">생년월일과 MBTI를 입력하면, AI가 두 사람의 사주를 분석해<br>1980년부터 지금까지의 특별한 이야기를 소설로 써드립니다</p>
    </header>

    <!-- 입력 폼 -->
    <form id="saju-form" class="form-card">

      <!-- 시작 년도 -->
      <div class="start-year-row">
        <label class="label-main">📅 스토리 시작 년도</label>
        <div class="start-year-input">
          <input type="number" id="start_year" name="start_year"
            min="1960" max="2010" value="1980"
            class="input-year" />
          <span class="unit">년도부터 이야기 시작</span>
        </div>
      </div>

      <!-- 두 사람 입력 -->
      <div class="persons-row">

        <!-- 남자 -->
        <div class="person-card male">
          <div class="person-header">
            <span class="person-icon">♂</span>
            <span class="person-label">남자</span>
          </div>

          <div class="field-group">
            <label>이름</label>
            <input type="text" id="male_name" placeholder="이름을 입력하세요" class="input-text" required />
          </div>

          <div class="field-group">
            <label>생년월일</label>
            <div class="calendar-type">
              <label class="radio-label">
                <input type="radio" name="male_cal" value="solar" checked /> 양력
              </label>
              <label class="radio-label">
                <input type="radio" name="male_cal" value="lunar" /> 음력
              </label>
            </div>
            <div class="date-row">
              <input type="number" id="male_year" placeholder="년" min="1940" max="2010" class="input-date" required />
              <input type="number" id="male_month" placeholder="월" min="1" max="12" class="input-date sm" required />
              <input type="number" id="male_day" placeholder="일" min="1" max="31" class="input-date sm" required />
            </div>
          </div>

          <div class="field-group">
            <label>태어난 시간</label>
            <div class="time-row">
              <select id="male_hour" class="input-select">
                <option value="23">자시 (23:00~01:00)</option>
                <option value="1">축시 (01:00~03:00)</option>
                <option value="3">인시 (03:00~05:00)</option>
                <option value="5">묘시 (05:00~07:00)</option>
                <option value="7">진시 (07:00~09:00)</option>
                <option value="9">사시 (09:00~11:00)</option>
                <option value="11">오시 (11:00~13:00)</option>
                <option value="13">미시 (13:00~15:00)</option>
                <option value="15">신시 (15:00~17:00)</option>
                <option value="17">유시 (17:00~19:00)</option>
                <option value="19">술시 (19:00~21:00)</option>
                <option value="21">해시 (21:00~23:00)</option>
              </select>
              <label class="checkbox-label">
                <input type="checkbox" id="male_time_unknown" />
                <span>모름</span>
              </label>
            </div>
          </div>

          <div class="field-group">
            <label>MBTI</label>
            <select id="male_mbti" class="input-select" required>
              <option value="">선택하세요</option>
              <optgroup label="분석가형 (NT)">
                <option>INTJ</option><option>INTP</option>
                <option>ENTJ</option><option>ENTP</option>
              </optgroup>
              <optgroup label="외교관형 (NF)">
                <option>INFJ</option><option>INFP</option>
                <option>ENFJ</option><option>ENFP</option>
              </optgroup>
              <optgroup label="관리자형 (SJ)">
                <option>ISTJ</option><option>ISFJ</option>
                <option>ESTJ</option><option>ESFJ</option>
              </optgroup>
              <optgroup label="탐험가형 (SP)">
                <option>ISTP</option><option>ISFP</option>
                <option>ESTP</option><option>ESFP</option>
              </optgroup>
            </select>
          </div>
        </div>

        <!-- 하트 구분선 -->
        <div class="divider-heart">
          <div class="heart-line"></div>
          <span class="heart">♥</span>
          <div class="heart-line"></div>
        </div>

        <!-- 여자 -->
        <div class="person-card female">
          <div class="person-header">
            <span class="person-icon">♀</span>
            <span class="person-label">여자</span>
          </div>

          <div class="field-group">
            <label>이름</label>
            <input type="text" id="female_name" placeholder="이름을 입력하세요" class="input-text" required />
          </div>

          <div class="field-group">
            <label>생년월일</label>
            <div class="calendar-type">
              <label class="radio-label">
                <input type="radio" name="female_cal" value="solar" checked /> 양력
              </label>
              <label class="radio-label">
                <input type="radio" name="female_cal" value="lunar" /> 음력
              </label>
            </div>
            <div class="date-row">
              <input type="number" id="female_year" placeholder="년" min="1940" max="2010" class="input-date" required />
              <input type="number" id="female_month" placeholder="월" min="1" max="12" class="input-date sm" required />
              <input type="number" id="female_day" placeholder="일" min="1" max="31" class="input-date sm" required />
            </div>
          </div>

          <div class="field-group">
            <label>태어난 시간</label>
            <div class="time-row">
              <select id="female_hour" class="input-select">
                <option value="23">자시 (23:00~01:00)</option>
                <option value="1">축시 (01:00~03:00)</option>
                <option value="3">인시 (03:00~05:00)</option>
                <option value="5">묘시 (05:00~07:00)</option>
                <option value="7">진시 (07:00~09:00)</option>
                <option value="9">사시 (09:00~11:00)</option>
                <option value="11">오시 (11:00~13:00)</option>
                <option value="13">미시 (13:00~15:00)</option>
                <option value="15">신시 (15:00~17:00)</option>
                <option value="17">유시 (17:00~19:00)</option>
                <option value="19">술시 (19:00~21:00)</option>
                <option value="21">해시 (21:00~23:00)</option>
              </select>
              <label class="checkbox-label">
                <input type="checkbox" id="female_time_unknown" />
                <span>모름</span>
              </label>
            </div>
          </div>

          <div class="field-group">
            <label>MBTI</label>
            <select id="female_mbti" class="input-select" required>
              <option value="">선택하세요</option>
              <optgroup label="분석가형 (NT)">
                <option>INTJ</option><option>INTP</option>
                <option>ENTJ</option><option>ENTP</option>
              </optgroup>
              <optgroup label="외교관형 (NF)">
                <option>INFJ</option><option>INFP</option>
                <option>ENFJ</option><option>ENFP</option>
              </optgroup>
              <optgroup label="관리자형 (SJ)">
                <option>ISTJ</option><option>ISFJ</option>
                <option>ESTJ</option><option>ESFJ</option>
              </optgroup>
              <optgroup label="탐험가형 (SP)">
                <option>ISTP</option><option>ISFP</option>
                <option>ESTP</option><option>ESFP</option>
              </optgroup>
            </select>
          </div>
        </div>

      </div><!-- /persons-row -->

      <!-- 생성 버튼 -->
      <button type="submit" id="generate-btn" class="btn-generate">
        <span class="btn-icon">✨</span>
        <span class="btn-text">인생 소설 생성하기</span>
        <span class="btn-sub">사주 × MBTI 분석 후 AI가 작성합니다</span>
      </button>
    </form>

    <!-- 로딩 -->
    <div id="loading" class="loading hidden">
      <div class="loading-orb"></div>
      <p class="loading-text">사주를 분석하고 이야기를 쓰고 있어요...</p>
      <p class="loading-sub">두 사람의 운명을 엮는 중 ✨</p>
    </div>

    <!-- 스토리 출력 영역 -->
    <div id="story-container" class="story-container hidden">
      <div class="story-header">
        <h2 id="story-title" class="story-title"></h2>
        <button id="copy-btn" class="btn-copy" onclick="copyStory()">📋 전체 복사</button>
      </div>
      <div id="story-content" class="story-content"></div>
    </div>

  </div><!-- /container -->

  <script src="/static/js/script.js"></script>
</body>
</html>
