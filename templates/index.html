<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사주×MBTI 인생소설 | 우리가 만났다면</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <canvas id="stars"></canvas>

  <div class="container">

    <!-- 헤더 -->
    <header class="hero">
      <div class="hero-symbol">☯</div>
      <h1 class="hero-title">우리가 만났다면</h1>
      <p class="hero-subtitle">사주 × MBTI로 쓰여지는 두 사람의 가상 인생 소설</p>
      <p class="hero-desc">생년월일과 MBTI를 입력하면, 사주를 분석하고<br>두 사람의 인생 이야기를 소설로 써드립니다</p>
    </header>

    <!-- 입력 폼 -->
    <form id="saju-form" class="form-card">

      <div class="start-year-row">
        <label class="label-main">📅 스토리 시작 년도</label>
        <div class="start-year-input">
          <input type="number" id="start_year" min="1960" max="2010" value="1980" class="input-year" />
          <span class="unit">년도부터 이야기 시작</span>
        </div>
      </div>

      <div class="persons-row">

        <!-- 남자 -->
        <div class="person-card male">
          <div class="person-header">
            <span class="person-icon">♂</span>
            <span class="person-label">남자</span>
          </div>
          <div class="field-group">
            <label>이름</label>
            <input type="text" id="male_name" placeholder="이름을 입력하세요" class="input-text" required />
          </div>
          <div class="field-group">
            <label>생년월일</label>
            <div class="calendar-type">
              <label class="radio-label"><input type="radio" name="male_cal" value="solar" checked /> 양력</label>
              <label class="radio-label"><input type="radio" name="male_cal" value="lunar" /> 음력</label>
            </div>
            <div class="date-row">
              <input type="number" id="male_year" placeholder="년" min="1940" max="2010" class="input-date" required />
              <input type="number" id="male_month" placeholder="월" min="1" max="12" class="input-date sm" required />
              <input type="number" id="male_day" placeholder="일" min="1" max="31" class="input-date sm" required />
            </div>
          </div>
          <div class="field-group">
            <label>태어난 시간</label>
            <div class="time-row">
              <select id="male_hour" class="input-select">
                <option value="23">자시 (23:00~01:00)</option>
                <option value="1">축시 (01:00~03:00)</option>
                <option value="3">인시 (03:00~05:00)</option>
                <option value="5">묘시 (05:00~07:00)</option>
                <option value="7">진시 (07:00~09:00)</option>
                <option value="9">사시 (09:00~11:00)</option>
                <option value="11">오시 (11:00~13:00)</option>
                <option value="13">미시 (13:00~15:00)</option>
                <option value="15">신시 (15:00~17:00)</option>
                <option value="17">유시 (17:00~19:00)</option>
                <option value="19">술시 (19:00~21:00)</option>
                <option value="21">해시 (21:00~23:00)</option>
              </select>
              <label class="checkbox-label">
                <input type="checkbox" id="male_time_unknown" /> <span>모름</span>
              </label>
            </div>
          </div>
          <div class="field-group">
            <label>MBTI</label>
            <select id="male_mbti" class="input-select" required>
              <option value="">선택하세요</option>
              <optgroup label="분석가형 (NT)">
                <option>INTJ</option><option>INTP</option><option>ENTJ</option><option>ENTP</option>
              </optgroup>
              <optgroup label="외교관형 (NF)">
                <option>INFJ</option><option>INFP</option><option>ENFJ</option><option>ENFP</option>
              </optgroup>
              <optgroup label="관리자형 (SJ)">
                <option>ISTJ</option><option>ISFJ</option><option>ESTJ</option><option>ESFJ</option>
              </optgroup>
              <optgroup label="탐험가형 (SP)">
                <option>ISTP</option><option>ISFP</option><option>ESTP</option><option>ESFP</option>
              </optgroup>
            </select>
          </div>
        </div>

        <!-- 하트 구분선 -->
        <div class="divider-heart">
          <div class="heart-line"></div>
          <span class="heart">♥</span>
          <div class="heart-line"></div>
        </div>

        <!-- 여자 -->
        <div class="person-card female">
          <div class="person-header">
            <span class="person-icon">♀</span>
            <span class="person-label">여자</span>
          </div>
          <div class="field-group">
            <label>이름</label>
            <input type="text" id="female_name" placeholder="이름을 입력하세요" class="input-text" required />
          </div>
          <div class="field-group">
            <label>생년월일</label>
            <div class="calendar-type">
              <label class="radio-label"><input type="radio" name="female_cal" value="solar" checked /> 양력</label>
              <label class="radio-label"><input type="radio" name="female_cal" value="lunar" /> 음력</label>
            </div>
            <div class="date-row">
              <input type="number" id="female_year" placeholder="년" min="1940" max="2010" class="input-date" required />
              <input type="number" id="female_month" placeholder="월" min="1" max="12" class="input-date sm" required />
              <input type="number" id="female_day" placeholder="일" min="1" max="31" class="input-date sm" required />
            </div>
          </div>
          <div class="field-group">
            <label>태어난 시간</label>
            <div class="time-row">
              <select id="female_hour" class="input-select">
                <option value="23">자시 (23:00~01:00)</option>
                <option value="1">축시 (01:00~03:00)</option>
                <option value="3">인시 (03:00~05:00)</option>
                <option value="5">묘시 (05:00~07:00)</option>
                <option value="7">진시 (07:00~09:00)</option>
                <option value="9">사시 (09:00~11:00)</option>
                <option value="11">오시 (11:00~13:00)</option>
                <option value="13">미시 (13:00~15:00)</option>
                <option value="15">신시 (15:00~17:00)</option>
                <option value="17">유시 (17:00~19:00)</option>
                <option value="19">술시 (19:00~21:00)</option>
                <option value="21">해시 (21:00~23:00)</option>
              </select>
              <label class="checkbox-label">
                <input type="checkbox" id="female_time_unknown" /> <span>모름</span>
              </label>
            </div>
          </div>
          <div class="field-group">
            <label>MBTI</label>
            <select id="female_mbti" class="input-select" required>
              <option value="">선택하세요</option>
              <optgroup label="분석가형 (NT)">
                <option>INTJ</option><option>INTP</option><option>ENTJ</option><option>ENTP</option>
              </optgroup>
              <optgroup label="외교관형 (NF)">
                <option>INFJ</option><option>INFP</option><option>ENFJ</option><option>ENFP</option>
              </optgroup>
              <optgroup label="관리자형 (SJ)">
                <option>ISTJ</option><option>ISFJ</option><option>ESTJ</option><option>ESFJ</option>
              </optgroup>
              <optgroup label="탐험가형 (SP)">
                <option>ISTP</option><option>ISFP</option><option>ESTP</option><option>ESFP</option>
              </optgroup>
            </select>
          </div>
        </div>

      </div><!-- /persons-row -->

      <button type="submit" id="analyze-btn" class="btn-generate">
        <span class="btn-icon">🔮</span>
        <span class="btn-text">사주 분석 시작</span>
        <span class="btn-sub">1단계: 사주 카드 분석 → 2단계: 인생 소설 생성</span>
      </button>
    </form>

    <!-- 로딩 -->
    <div id="loading" class="loading hidden">
      <div class="loading-orb"></div>
      <p class="loading-text" id="loading-text">사주를 분석하고 있어요...</p>
      <p class="loading-sub" id="loading-sub">두 사람의 운명을 읽는 중 ✨</p>
    </div>

    <!-- 1단계: 사주 분석 카드 -->
    <div id="analysis-section" class="hidden">
      <div class="section-title-row">
        <h2 class="section-title">🔮 사주 분석 결과</h2>
      </div>
      <div class="analysis-cards">
        <div id="card-male" class="analysis-card male-card">
          <div class="card-loading">분석 중...</div>
        </div>
        <div id="card-female" class="analysis-card female-card">
          <div class="card-loading">분석 중...</div>
        </div>
        <div id="card-compat" class="analysis-card compat-card">
          <div class="card-loading">분석 중...</div>
        </div>
      </div>

      <!-- 소설 시작 버튼 -->
      <div id="novel-start-area" class="hidden">
        <div class="novel-start-divider">
          <span>✦ ✦ ✦</span>
        </div>
        <p class="novel-start-desc">사주 분석이 완료됐어요.<br>이제 두 사람의 인생 소설을 읽어볼까요?</p>
        <button id="start-novel-btn" class="btn-novel-start" onclick="startNovel()">
          <span>📖 인생 소설 1부 시작하기</span>
          <span class="btn-sub">성장기 · 첫 만남</span>
        </button>
      </div>
    </div>

    <!-- 2단계: 이어쓰기 소설 -->
    <div id="novel-section" class="hidden">

      <!-- 파트 콘텐츠 -->
      <div id="parts-container"></div>

      <!-- 이어쓰기 버튼 -->
      <div id="continue-area" class="hidden">
        <button id="continue-btn" class="btn-continue" onclick="continueNovel()">
          <span>✍️ 이어쓰기</span>
          <span class="btn-sub">다음 이야기 계속 보기</span>
        </button>
      </div>

      <!-- 완결 -->
      <div id="novel-end" class="hidden">
        <div class="novel-end-card">
          <div class="end-symbol">✦</div>
          <h3 id="end-title">두 사람의 이야기, 완결</h3>
          <p id="end-desc"></p>
          <button class="btn-copy-all" onclick="copyAll()">📋 전체 이야기 복사</button>
          <button class="btn-restart" onclick="location.reload()">🔄 새 이야기 만들기</button>
        </div>
      </div>
    </div>

  </div><!-- /container -->

  <script src="/static/js/script.js"></script>
</body>
</html>
